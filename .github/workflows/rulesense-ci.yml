name: rulesense CI

# Run on any change to rulesense/ or this workflow. The monorepo may host other
# plugins; we only exercise rulesense here to keep the matrix fast and signal
# narrow.
on:
  push:
    branches: [main]
    paths:
      - 'rulesense/**'
      - '.github/workflows/rulesense-ci.yml'
  pull_request:
    paths:
      - 'rulesense/**'
      - '.github/workflows/rulesense-ci.yml'

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast off: a single OS/Python regression shouldn't hide regressions
      # on the others — we want the full picture.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        # rulesense uses only the Python standard library at runtime; pytest is
        # the single test-time dependency.
        run: python -m pip install --upgrade pip pytest

      - name: Run rulesense test suite
        working-directory: rulesense
        run: pytest tests/ -v
